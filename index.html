<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>COIN LUCK SNS管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

</head>
<body>
<div id="app">

  <!-- ===== SIDEBAR (desktop) ===== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="images/rack-kun.png" class="sidebar-logo-img" alt="ラックくん">
      <div>
        <div class="sidebar-title">COIN LUCK</div>
        <div class="sidebar-sub">SNS運用管理</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-btn active" data-page="home">🏠 HOME</button>
      <button class="sidebar-btn" data-page="status">🌳 タスク</button>
      <button class="sidebar-btn" data-page="posts">📌 投稿リスト</button>
      <button class="sidebar-btn" data-page="videos">🎞️ 動画リスト</button>
      <button class="sidebar-btn" data-page="notes">📖 ノート</button>
      <button class="sidebar-btn" data-page="links">✏️ リンク集</button>
    </nav>
    <button class="sidebar-add-btn" id="sidebar-add-btn">＋ タスク追加</button>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="app-main">

    <!-- HOME -->
    <div id="page-home" class="page active">
      <header class="page-header">
        <div class="logo-area">
          <img src="images/rack-kun.png" class="header-logo-img" alt="ラックくん">
          <div>
            <h1 class="header-title">COIN LUCK</h1>
            <p class="header-sub">SNS運用管理</p>
          </div>
        </div>
        <div id="today-date" class="date-area"></div>
      </header>
      <div class="page-content" id="home-content"></div>
    </div>

    <!-- STATUS -->
    <div id="page-status" class="page">
      <header class="page-header page-header--simple">
        <h2>🌳 タスク</h2>
      </header>
      <div class="filter-bar" id="status-filters"></div>
      <div class="page-content" id="status-content"></div>
    </div>

    <!-- POSTS -->
    <div id="page-posts" class="page">
      <header class="page-header page-header--simple">
        <h2>📌 投稿リスト</h2>
      </header>
      <div class="page-content" id="posts-content"></div>
    </div>

    <!-- VIDEOS -->
    <div id="page-videos" class="page">
      <header class="page-header page-header--simple">
        <h2>🎞️ 動画リスト</h2>
      </header>
      <div class="tab-bar" id="video-tabs">
        <button class="tab-btn active" data-target="reels">月リール</button>
        <button class="tab-btn" data-target="english">英語リール</button>
        <button class="tab-btn" data-target="ec">ECリール</button>
        <button class="tab-btn" data-target="personal">個人リール</button>
      </div>
      <div class="page-content" id="video-content"></div>
    </div>

    <!-- NOTES -->
    <div id="page-notes" class="page">
      <header class="page-header page-header--simple">
        <h2>📖 ノート</h2>
        <button class="header-btn" id="add-note-btn">＋ 追加</button>
      </header>
      <div class="page-content" id="notes-content"></div>
    </div>

    <!-- LINKS -->
    <div id="page-links" class="page">
      <header class="page-header page-header--simple">
        <h2>✏️ リンク・コピペ集</h2>
        <button class="header-btn" id="add-link-btn">＋ 追加</button>
      </header>
      <div class="page-content" id="links-content"></div>
    </div>

  </div><!-- /.app-main -->

  <!-- ===== BOTTOM NAV (mobile) ===== -->
  <!-- Order: HOME | ステータス | 投稿 | ＋ | 動画 | ノート | リンク -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-page="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">HOME</span>
    </button>
    <button class="nav-btn" data-page="status">
      <span class="nav-icon">🌳</span>
      <span class="nav-label">タスク</span>
    </button>
    <button class="nav-btn" data-page="posts">
      <span class="nav-icon">📌</span>
      <span class="nav-label">投稿</span>
    </button>
    <button class="nav-btn nav-add-btn" id="open-add-modal">
      <span class="nav-add-icon">＋</span>
    </button>
    <button class="nav-btn" data-page="videos">
      <span class="nav-icon">🎞️</span>
      <span class="nav-label">動画</span>
    </button>
    <button class="nav-btn" data-page="notes">
      <span class="nav-icon">📖</span>
      <span class="nav-label">ノート</span>
    </button>
    <button class="nav-btn" data-page="links">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">リンク</span>
    </button>
  </nav>

  <!-- ===== TASK MODAL ===== -->
  <div id="task-modal" class="modal is-hidden">
    <div class="modal-backdrop" id="task-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="modal-title">タスク追加</h3>
        <button class="modal-close-btn" id="close-task-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="task-form" autocomplete="off">
          <input type="hidden" id="task-id">
          <div class="form-group">
            <label for="task-title">タスク名 <span class="required">*</span></label>
            <input type="text" id="task-title" placeholder="タスクを入力" required>
          </div>
          <div class="form-group">
            <label for="task-store">店舗</label>
            <select id="task-store"><option value="">未選択</option></select>
          </div>
          <div class="form-group">
            <label>SNS</label>
            <div class="platform-grid" id="platform-grid"></div>
          </div>
          <div class="form-group">
            <label>ステータス <span class="required">*</span></label>
            <div class="status-chip-row" id="status-grid"></div>
          </div>
          <div class="form-group">
            <label for="task-post-date">投稿日（任意）</label>
            <div class="post-date-row">
              <input type="date" id="task-post-date" style="flex:1">
              <label class="hold-check-label">
                <input type="checkbox" id="task-hold">
                時期まで保留
              </label>
            </div>
          </div>
          <div class="form-group">
            <label for="task-notes">メモ（任意）</label>
            <textarea id="task-notes" placeholder="メモを入力" rows="2"></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-danger is-hidden" id="delete-task-btn">削除</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
          <div id="task-updated-info" class="task-updated-modal is-hidden"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== LINK MODAL ===== -->
  <div id="link-modal" class="modal is-hidden">
    <div class="modal-backdrop" id="link-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="link-modal-title">リンク追加</h3>
        <button class="modal-close-btn" id="close-link-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="link-form" autocomplete="off">
          <input type="hidden" id="link-id">
          <div class="form-group">
            <label for="link-category">カテゴリ</label>
            <input type="text" id="link-category" placeholder="例：TikTok、Instagram" list="category-datalist">
            <datalist id="category-datalist"></datalist>
          </div>
          <div class="form-group">
            <label for="link-label">ラベル <span class="required">*</span></label>
            <input type="text" id="link-label" placeholder="リンクの名前" required>
          </div>
          <div class="form-group">
            <label for="link-content">内容 <span class="required">*</span></label>
            <textarea id="link-content" placeholder="URLやコピーするテキストを入力" rows="4" required></textarea>
          </div>
          <div class="form-group">
            <label>種類</label>
            <div class="radio-row">
              <label class="radio-label"><input type="radio" name="link-type" value="link" checked> 🔗 リンク</label>
              <label class="radio-label"><input type="radio" name="link-type" value="text"> 📝 テキスト</label>
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-danger is-hidden" id="delete-link-btn">削除</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== REEL MODAL ===== -->
  <div id="reel-modal" class="modal is-hidden">
    <div class="modal-backdrop" id="reel-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="reel-modal-title">月リール追加</h3>
        <button class="modal-close-btn" id="close-reel-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="reel-form" autocomplete="off">
          <input type="hidden" id="reel-mode">
          <input type="hidden" id="reel-type">
          <input type="hidden" id="reel-group-id">
          <input type="hidden" id="reel-video-id">

          <div id="reel-month-section">
            <div class="form-row" id="reel-month-row">
              <div class="form-group">
                <label for="reel-prod-month">制作月 <span class="required">*</span></label>
                <select id="reel-prod-month">
                  <option value="">選択してください</option>
                  <option value="1月">1月</option>
                  <option value="2月">2月</option>
                  <option value="3月">3月</option>
                  <option value="4月">4月</option>
                  <option value="5月">5月</option>
                  <option value="6月">6月</option>
                  <option value="7月">7月</option>
                  <option value="8月">8月</option>
                  <option value="9月">9月</option>
                  <option value="10月">10月</option>
                  <option value="11月">11月</option>
                  <option value="12月">12月</option>
                </select>
              </div>
              <div class="form-group" id="reel-post-month-group">
                <label for="reel-post-month">投稿月（自動）</label>
                <input type="text" id="reel-post-month" placeholder="制作月選択で自動入力" readonly>
              </div>
            </div>
            <div id="reel-ec-note" class="form-hint is-hidden">タスクは「EC店」として自動生成されます</div>
            <div id="reel-personal-store-section" class="form-group is-hidden" style="margin-top:8px">
              <label>店舗選択（タスク生成）</label>
              <div id="store-check-grid" class="store-check-grid"></div>
            </div>
          </div>

          <div class="form-group">
            <label for="reel-title-1" id="reel-label-1">リール① タイトル <span class="required">*</span></label>
            <input type="text" id="reel-title-1" placeholder="動画タイトルを入力" required>
          </div>
          <div class="form-group">
            <label for="reel-note-1">メモ（任意）</label>
            <input type="text" id="reel-note-1" placeholder="備考・注意事項">
          </div>

          <div id="reel-video2-section">
            <div class="section-divider">リール② <span class="required">*</span></div>
            <div class="form-group">
              <label for="reel-title-2">リール② タイトル <span class="required">*</span></label>
              <input type="text" id="reel-title-2" placeholder="動画タイトルを入力">
            </div>
            <div class="form-group">
              <label for="reel-note-2">メモ（任意）</label>
              <input type="text" id="reel-note-2" placeholder="備考・注意事項">
            </div>
          </div>

          <div class="form-group" id="reel-task-gen-section">
            <label class="checkbox-label">
              <input type="checkbox" id="reel-gen-tasks" checked>
              6店舗分のタスクを自動生成（撮影中）
            </label>
            <div class="form-hint">仙台①〇〇・岐阜①〇〇・… 計最大12タスクを作成</div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn-danger is-hidden" id="delete-reel-btn">削除</button>
            <button type="submit" class="btn-primary" id="reel-submit-btn">追加</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== NOTE MODAL ===== -->
  <div id="note-modal" class="modal is-hidden">
    <div class="modal-backdrop" id="note-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="note-modal-title">ノート追加</h3>
        <button class="modal-close-btn" id="close-note-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="note-form" autocomplete="off">
          <input type="hidden" id="note-id">
          <div class="form-group">
            <label for="note-category">カテゴリ（任意）</label>
            <input type="text" id="note-category" placeholder="例：ルール、メモ" list="note-category-datalist">
            <datalist id="note-category-datalist"></datalist>
          </div>
          <div class="form-group">
            <label for="note-label">ラベル（任意）</label>
            <input type="text" id="note-label" placeholder="タイトルや見出し">
          </div>
          <div class="form-group">
            <label for="note-content">内容 <span class="required">*</span></label>
            <textarea id="note-content" placeholder="メモ・ルールなどを入力" rows="5" required></textarea>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="note-pinned">
              📌 ピン留め（上部に固定）
            </label>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-danger is-hidden" id="delete-note-btn">削除</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== ANNOUNCE MODAL ===== -->
  <div id="announce-modal" class="modal is-hidden">
    <div class="modal-backdrop" id="announce-modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3 id="announce-modal-title">お知らせ追加</h3>
        <button class="modal-close-btn" id="close-announce-modal">✕</button>
      </div>
      <div class="modal-body">
        <form id="announce-form" autocomplete="off">
          <input type="hidden" id="announce-id">
          <div class="form-group">
            <label for="announce-text">内容 <span class="required">*</span></label>
            <textarea id="announce-text" placeholder="お知らせ内容を入力" rows="4" required></textarea>
          </div>
          <div class="form-actions">
            <button type="button" class="btn-danger is-hidden" id="delete-announce-btn">削除</button>
            <button type="submit" class="btn-primary">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== SCHEDULE EDIT MODAL ===== -->
  <div id="schedule-edit-modal" class="modal is-hidden">
    <div class="modal-backdrop" onclick="closeScheduleEdit()"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <h3>スケジュール編集</h3>
        <button class="modal-close-btn" onclick="closeScheduleEdit()">✕</button>
      </div>
      <div class="modal-body">
        <div id="schedule-edit-body"></div>
        <div class="sch-add-entry-row">
          <span class="sch-add-entry-label">〆切日を追加</span>
          <input type="number" id="new-dl-day" min="1" max="31" placeholder="日（例：5）" class="sch-day-input">
          <button class="sch-add-entry-btn" onclick="schedAddEntry()">追加</button>
        </div>
      </div>
      <div class="sch-footer">
        <button class="btn-primary" onclick="saveScheduleEdit()">保存する</button>
      </div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast" class="toast is-hidden"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="js/app.js"></script>
</body>
</html>
